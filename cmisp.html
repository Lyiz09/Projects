    <div id="inscricao">
        <div class="container-info">
            <!--card that flips when clicked-->

    <script>
        // Header background change - show background when header bottom exits background image
        document.addEventListener('DOMContentLoaded', function() {
            const header = document.querySelector('.site-header');
            let backgroundHeight = window.innerHeight; // 100vh
            const headerHeight = 80; // Header is 80px tall

            function handleScroll() {
                // Show header background when bottom of header (scrollY + 80) goes past background image
                if (window.scrollY + headerHeight >= backgroundHeight) {
                    header.classList.add('header-scrolled');
                } else {
                    header.classList.remove('header-scrolled');
                }
            }

            // Handle resize events to update background height
            window.addEventListener('resize', function() {
                backgroundHeight = window.innerHeight;
                handleScroll(); // Check if we need to update visibility on resize
            });

            // Initial check and scroll listener
            handleScroll();
            window.addEventListener('scroll', handleScroll);

            // Card flip animation on click
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                });
            });

            // Mobile menu toggle
            const menuToggle = document.querySelector('.menu-toggle');
            const navbar = document.querySelector('.navbar');
            const navLinks = document.querySelectorAll('.nav-links a');

            if (menuToggle && navbar) {
                menuToggle.addEventListener('click', function() {
                    const isOpen = navbar.classList.toggle('open');
                    menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                    menuToggle.textContent = isOpen ? '✕' : '☰';
                });

                // Close menu when a link is clicked
                navLinks.forEach(link => {
                    link.addEventListener('click', function() {
                        navbar.classList.remove('open');
                        menuToggle.setAttribute('aria-expanded', 'false');
                        menuToggle.textContent = '☰';
                    });
                });

                // Close menu when clicking outside
                document.addEventListener('click', function(event) {
                    const isClickInsideHeader = event.target.closest('.site-header');
                    if (!isClickInsideHeader && navbar.classList.contains('open')) {
                        navbar.classList.remove('open');
                        menuToggle.setAttribute('aria-expanded', 'false');
                        menuToggle.textContent = '☰';
                    }
                });

                // Reset menu state when resizing back to desktop
                window.addEventListener('resize', function() {
                    if (window.innerWidth > 768) {
                        navbar.classList.remove('open');
                        menuToggle.setAttribute('aria-expanded', 'false');
                        menuToggle.textContent = '☰';
                    }
                });
            }
        });
    </script>
