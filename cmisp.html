    <script>
        // Header background change - show background when header bottom exits background image
        document.addEventListener('DOMContentLoaded', function() {
            const header = document.querySelector('.site-header');
            let backgroundHeight = window.innerHeight; // 100vh
            const headerHeight = 80; // Header is 80px tall

            function handleScroll() {
                // Show header background when bottom of header (scrollY + 80) goes past background image
                if (window.scrollY + headerHeight >= backgroundHeight) {
                    header.classList.add('header-scrolled');
                } else {
                    header.classList.remove('header-scrolled');
                }
            }

            // Handle resize events to update background height
            window.addEventListener('resize', function() {
                backgroundHeight = window.innerHeight;
                handleScroll(); // Check if we need to update visibility on resize
            });

            // Initial check and scroll listener
            handleScroll();
            window.addEventListener('scroll', handleScroll);
        });
    </script>
